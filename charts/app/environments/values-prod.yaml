global:
  imageRegistry: REPLACE_WITH_REGISTRY
  imagePullPolicy: IfNotPresent
  ingress:
    scheme: https
    hostSuffix: app.example.com
    tls:
      enabled: true
      secretName: app-tls
components:
  frontend:
    replicas: 3
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }
  backend:
    replicas: 3
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
